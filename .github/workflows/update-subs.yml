name: Hourly Subscriber Update (Direct Mobile)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # We combine setup, install, and execution into one sequential process block
      - name: Setup Python, Install Dependencies, and Run Scraper
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests
          python scraper.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@://github.com"
          
          if git diff --quiet stats.json; then
            echo "No changes detected."
          else
            git add stats.json
            git commit -m "Automated native subscriber update [skip ci]"
            git push
          fi
